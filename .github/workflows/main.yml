name: Daily ProgramTV Scraper

on:
  schedule:
    - cron: '30 3 * * *'   # 06:30 Bucharest
    - cron: '30 4 * * *'   # 07:30 Bucharest
    - cron: '30 5 * * *'   # 08:30 Bucharest
    - cron: '30 6 * * *'   # 09:30 Bucharest
  workflow_dispatch:    # Allow manual run

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scrapper_cinemag_ptv.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add tv_schedule.json
          git commit -m "Auto update: $(date -u)"
          git push
